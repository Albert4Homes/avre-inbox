<!doctype html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>AVRE Inbox</title>
<style>
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f4f5f7; color:#111; }
header { background:#0b5cff; color:#fff; padding:12px 16px; font-weight:600; font-size:18px; position:sticky; top:0; display:flex; align-items:center; gap:12px; z-index:5; }
header .back { cursor:pointer; font-size:22px; display:none; }
#list .row { background:#fff; border-bottom:1px solid #eee; padding:12px 16px; cursor:pointer; }
#list .row .n { font-weight:600; margin-bottom:2px; }
#list .row .s { color:#666; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#thread { display:none; padding:12px; padding-bottom:84px; }
#msgs { display:flex; flex-direction:column; }
.msg { max-width:80%; padding:8px 12px; border-radius:14px; margin:5px 0; font-size:15px; white-space:pre-wrap; word-wrap:break-word; }
.in { background:#e6e7ea; align-self:flex-start; }
.out { background:#0b5cff; color:#fff; margin-left:auto; }
#composer { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #ddd; padding:8px; display:none; gap:8px; }
#composer textarea { flex:1; resize:none; border:1px solid #ccc; border-radius:18px; padding:9px 12px; font-size:15px; height:40px; }
#composer button { background:#0b5cff; color:#fff; border:none; border-radius:18px; padding:0 18px; font-weight:600; font-size:15px; }
.empty { padding:28px; text-align:center; color:#888; }
</style></head>
<body>
<header><span class='back' id='back'>&#8592;</span><span id='title'>AVRE Inbox</span></header>
<div id='list'></div>
<div id='thread'><div id='msgs'></div></div>
<div id='composer'><textarea id='inp' placeholder='Type a reply...'></textarea><button id='send'>Send</button></div>
<script>
var API = 'https://ppqxqrfoyguwtuzlbsfb.supabase.co/functions/v1/inbox';
var KEY = localStorage.getItem('avre_inbox_key') || '';
var CUR = null, timer = null;
function q(id){ return document.getElementById(id); }
function ensureKey(){ if (!KEY){ KEY = prompt('Enter AVRE inbox access key') || ''; if (KEY) localStorage.setItem('avre_inbox_key', KEY); } }
function api(qs){ return fetch(API + '?' + qs + '&k=' + encodeURIComponent(KEY)).then(function(r){ if (r.status === 401){ localStorage.removeItem('avre_inbox_key'); KEY = ''; alert('Wrong key. Reload and try again.'); } return r.json(); }); }
function esc(t){ var d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
function showList(){ CUR = null; if (timer) clearInterval(timer); q('thread').style.display = 'none'; q('composer').style.display = 'none'; q('list').style.display = 'block'; q('back').style.display = 'none'; q('title').textContent = 'AVRE Inbox'; loadList(); }
function loadList(){ ensureKey(); api('action=list').then(function(d){ var el = q('list'); if (!d || !d.conversations || d.conversations.length === 0){ el.innerHTML = '<div class=empty>No conversations yet.</div>'; return; } el.innerHTML = ''; d.conversations.forEach(function(c){ var row = document.createElement('div'); row.className = 'row'; row.innerHTML = '<div class=n>' + esc(c.contact_pretty) + '</div><div class=s>' + esc(c.last_body) + '</div>'; row.onclick = function(){ openThread(c.contact); }; el.appendChild(row); }); }); }
function openThread(contact){ CUR = contact; q('list').style.display = 'none'; q('thread').style.display = 'block'; q('composer').style.display = 'flex'; q('back').style.display = 'inline'; loadThread(); if (timer) clearInterval(timer); timer = setInterval(loadThread, 6000); }
function loadThread(){ ensureKey(); api('action=thread&c=' + encodeURIComponent(CUR)).then(function(d){ if (!d) return; q('title').textContent = d.contact_pretty || 'Conversation'; var m = q('msgs'); m.innerHTML = ''; (d.messages || []).forEach(function(x){ var b = document.createElement('div'); b.className = 'msg ' + (x.direction === 'inbound' ? 'in' : 'out'); b.textContent = x.body; m.appendChild(b); }); window.scrollTo(0, document.body.scrollHeight); }); }
function doSend(){ var t = q('inp').value.trim(); if (!t || !CUR) return; q('inp').value = ''; fetch(API + '?action=send&k=' + encodeURIComponent(KEY), { method:'POST', body:JSON.stringify({ to:CUR, body:t }) }).then(function(r){ return r.json(); }).then(function(d){ loadThread(); if (d && d.error) alert('Send failed: ' + d.error); }); }
q('back').onclick = showList; q('send').onclick = doSend;
q('inp').addEventListener('keydown', function(e){ if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); doSend(); } });
var params = new URLSearchParams(location.search); var c = params.get('c');
ensureKey();
if (c) openThread(c); else showList();
</script>
</body></html>
